<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joy · Lịch sử hội thoại</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
      .admin-header {
        background: linear-gradient(135deg, #2c5cff, #7b5cff);
        color: #fff;
        padding: 12px 20px;
        font-weight: 600;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .admin-header a {
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        opacity: 0.95;
      }
      .admin-header a:hover { text-decoration: underline; }
      .admin-layout {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      .sidebar {
        width: 320px;
        min-width: 280px;
        background: #fff;
        border-right: 1px solid #e5e7eb;
        overflow-y: auto;
        padding: 12px;
      }
      .sidebar h2 {
        margin: 0 0 12px 0;
        font-size: 14px;
        color: #6b7280;
        font-weight: 600;
      }
      .sidebar .search-wrap {
        margin-bottom: 12px;
      }
      .sidebar .search-wrap input {
        width: 100%;
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
      }
      .sidebar .search-wrap input:focus {
        outline: none;
        border-color: #2c5cff;
      }
      .session-item {
        padding: 10px 12px;
        margin-bottom: 6px;
        border-radius: 8px;
        cursor: pointer;
        background: #f9fafb;
        border: 1px solid transparent;
        transition: background 0.15s, border-color 0.15s;
      }
      .session-item:hover {
        background: #eff6ff;
        border-color: #93c5fd;
      }
      .session-item.active {
        background: #dbeafe;
        border-color: #2c5cff;
      }
      .session-item .label {
        font-weight: 500;
        color: #111;
        margin-bottom: 2px;
      }
      .session-item .meta {
        font-size: 12px;
        color: #6b7280;
      }
      .session-item .meta .same-person {
        color: #059669;
        font-weight: 500;
      }
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f5f5f7;
      }
      .content-placeholder {
        color: #6b7280;
        text-align: center;
        padding: 40px 20px;
        font-size: 15px;
      }
      .mobile-hint { display: none; }
      .conversation {
        max-width: 720px;
        margin: 0 auto;
      }
      .conversation-header {
        background: #fff;
        padding: 12px 16px;
        border-radius: 10px 10px 0 0;
        border: 1px solid #e5e7eb;
        border-bottom: none;
        font-weight: 600;
        color: #374151;
      }
      .conversation-header .meta { font-size: 12px; font-weight: normal; color: #6b7280; margin-top: 4px; }
      .conversation-header .same-person { color: #059669; font-weight: 500; }
      .message-list {
        list-style: none;
        margin: 0;
        padding: 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 0 0 10px 10px;
      }
      .message-list li {
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        max-width: 85%;
      }
      .message-list li.user {
        margin-left: 0;
        margin-right: auto;
        background: #e3f2fd;
      }
      .message-list li.model {
        margin-left: auto;
        margin-right: 0;
        background: #e8f5e9;
      }
      .message-list .msg-meta {
        font-size: 11px;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .message-list .msg-body {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .loading { color: #6b7280; padding: 20px; }
      .error { color: #dc2626; padding: 20px; background: #fef2f2; border-radius: 8px; margin: 20px; }

      /* Mobile: sidebar drawer, content full width */
      .menu-toggle {
        display: none;
        background: rgba(255,255,255,0.25);
        border: none;
        color: #fff;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        margin-right: 8px;
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 90;
      }
      .sidebar-overlay.show { display: block; }
      @media (max-width: 768px) {
        .menu-toggle { display: inline-flex; align-items: center; }
        .admin-layout { position: relative; }
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          width: 85%;
          max-width: 320px;
          z-index: 100;
          transform: translateX(-100%);
          transition: transform 0.25s ease;
          box-shadow: 4px 0 20px rgba(0,0,0,0.15);
        }
        .sidebar.open { transform: translateX(0); }
        .content {
          width: 100%;
          min-width: 0;
          padding: 12px;
        }
        .conversation { max-width: none; }
        .mobile-hint { display: inline; }
      }
    </style>
  </head>
  <body>
    <div class="admin-header">
      <button type="button" class="menu-toggle" id="menuToggle" aria-label="Mở danh sách">☰ Danh sách</button>
      <span>Joy · Lịch sử hội thoại</span>
      <a href="/admin/logout">Đăng xuất</a>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="admin-layout">
      <aside class="sidebar" id="sidebar">
        <h2>Danh sách phiên chat</h2>
        <div class="search-wrap">
          <input type="text" id="searchContact" placeholder="Tìm theo tên hoặc SĐT..." />
        </div>
        <div id="session-list"></div>
      </aside>
      <main class="content">
        <div id="content-area">
          <div class="content-placeholder">Chọn một phiên bên trái để xem nội dung.<span class="mobile-hint"> Nhấn <strong>☰ Danh sách</strong> để mở danh sách phiên.</span></div>
        </div>
      </main>
    </div>
    <script>
      (function () {
        const listEl = document.getElementById("session-list");
        const contentEl = document.getElementById("content-area");

        function escape(s) {
          const d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }

        function renderSessionList(sessions) {
          if (!sessions.length) {
            listEl.innerHTML = '<p class="loading">Chưa có phiên nào.</p>';
            return;
          }
          listEl.innerHTML = sessions
            .map(
              (s, i) => {
                const samePerson = (s.same_person_sessions || 1) > 1;
                const metaExtra = samePerson ? ` · <span class="same-person">Cùng 1 người (${s.same_person_sessions} phiên)</span>` : "";
                return `<div class="session-item" data-index="${i}" role="button" tabindex="0">
                  <div class="label">${escape(s.label)}</div>
                  <div class="meta">${escape(s.session_id.slice(0, 12))}… · ${s.message_count} tin${metaExtra}</div>
                </div>`;
              }
            )
            .join("");

          listEl.querySelectorAll(".session-item").forEach((el) => {
            el.addEventListener("click", () => selectSession(parseInt(el.dataset.index, 10)));
          });
        }

        function renderConversation(session) {
          const timeFmt = (t) => (t ? new Date(t).toLocaleString("vi-VN") : "");
          const samePersonNote = (session.same_person_sessions || 1) > 1
            ? ` <span class="same-person">· Cùng 1 người (${session.same_person_sessions} phiên)</span>` : "";
          contentEl.innerHTML = `
            <div class="conversation">
              <div class="conversation-header">
                ${escape(session.label)}${samePersonNote}
                <div class="meta">ID: ${escape(session.session_id)} · ${session.message_count} tin nhắn</div>
              </div>
              <ul class="message-list">
                ${(session.messages || [])
                  .map(
                    (m) =>
                      `<li class="${m.role === "user" ? "user" : "model"}">
                        <div class="msg-meta">${m.role === "user" ? "User" : "Joy"} · ${timeFmt(m.created_at)}</div>
                        <div class="msg-body">${escape(m.content || "").replace(/\n/g, "<br>")}</div>
                      </li>`
                  )
                  .join("")}
              </ul>
            </div>
          `;
        }

        function selectSession(index) {
          listEl.querySelectorAll(".session-item").forEach((el) => el.classList.remove("active"));
          const el = listEl.querySelector(`[data-index="${index}"]`);
          if (el) el.classList.add("active");
          if (window._adminSessions && window._adminSessions[index]) {
            renderConversation(window._adminSessions[index]);
          }
          closeSidebarMobile();
        }

        function isMobile() { return window.innerWidth <= 768; }
        function openSidebarMobile() {
          document.getElementById("sidebar").classList.add("open");
          document.getElementById("sidebarOverlay").classList.add("show");
        }
        function closeSidebarMobile() {
          document.getElementById("sidebar").classList.remove("open");
          document.getElementById("sidebarOverlay").classList.remove("show");
        }

        document.getElementById("menuToggle").addEventListener("click", function () {
          document.getElementById("sidebar").classList.toggle("open");
          document.getElementById("sidebarOverlay").classList.toggle("show");
        });
        document.getElementById("sidebarOverlay").addEventListener("click", closeSidebarMobile);

        function loadSessions(search) {
          const url = search
            ? "/api/admin/sessions?search=" + encodeURIComponent(search)
            : "/api/admin/sessions";
          fetch(url, { credentials: "include" })
            .then((r) => r.json().then((data) => ({ ok: r.ok, status: r.status, data })))
            .then(({ ok, status, data }) => {
              if (status === 401) {
                window.location.href = "/admin/login";
                return;
              }
              if (!ok) {
                const msg = data && data.error ? data.error : "Lỗi " + status;
                throw new Error(msg);
              }
              if (data.error) throw new Error(data.error);
              window._adminSessions = data.sessions || [];
              renderSessionList(window._adminSessions);
              if (window._adminSessions.length > 0) {
                selectSession(0);
              } else if (search) {
                contentEl.innerHTML = '<p class="loading">Không tìm thấy phiên nào với "' + escape(search) + '".</p>';
              }
            })
            .catch((err) => {
              listEl.innerHTML = "";
              let msg = err && err.message ? err.message : String(err);
              if (msg.indexOf("fetch failed") !== -1 || msg.indexOf("Failed to fetch") !== -1) {
                msg = "Không kết nối được máy chủ. Hãy chạy npm start và mở lại /admin.";
              }
              contentEl.innerHTML = '<p class="error">' + escape(msg) + "</p>";
            });
        }

        document.getElementById("searchContact").addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            loadSessions(this.value.trim());
          }
        });

        loadSessions("");
      })();
    </script>
  </body>
</html>
